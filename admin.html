<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 口罩绳官网</title>
    <style>
        * {box-sizing:border-box;margin:0;padding:0;font-family:微软雅黑}
        body{background:#f4f4f4;padding:20px}
        .container{max-width:1000px;margin:0 auto;background:#fff;padding:25px;border-radius:8px}
        h2{color:#333;margin-bottom:20px}
        .form-group{margin-bottom:15px}
        label{display:block;margin-bottom:5px;color:#555}
        input,textarea,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}
        button{padding:10px 20px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer}
        .product-list{margin-top:30px}
        .pro-item{border:1px solid #eee;padding:15px;margin:10px 0;border-radius:4px}
    </style>
</head>
<body>
    <div class="container">
        <h2>产品管理（无数据库 · 本地保存）</h2>
        <div class="form-group">
            <label>产品图片</label>
            <input type="file" id="proImg" accept="image/*">
        </div>
        <div class="form-group">
            <label>产品名称</label>
            <input type="text" id="proName" placeholder="如：3mm圆形口罩绳">
        </div>
        <div class="form-group">
            <label>产品分类</label>
            <select id="proCate">
                <option>圆形口罩绳</option>
                <option>扁形耳带</option>
                <option>KN95专用</option>
                <option>儿童口罩绳</option>
                <option>彩色定制</option>
            </select>
        </div>
        <div class="form-group">
            <label>产品描述</label>
            <textarea id="proDesc" rows="4" placeholder="材质、规格、优势"></textarea>
        </div>
        <button onclick="saveProduct()">保存产品</button>
        <div class="product-list" id="proList"></div>
    </div>

    <script>
        function getProducts() {
            return JSON.parse(localStorage.getItem('products') || '[]');
        }
        function saveProducts(list) {
            localStorage.setItem('products', JSON.stringify(list));
        }

        let imgPath = '';
        document.getElementById('proImg').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) imgPath = `images/${file.name}`;
            alert('图片已选择，保存后生效');
        });

        function saveProduct() {
            const name = document.getElementById('proName').value;
            const cate = document.getElementById('proCate').value;
            const desc = document.getElementById('proDesc').value;
            if (!name || !imgPath) {
                alert('请填写名称并选择图片');
                return;
            }
            const products = getProducts();
            products.push({
                id: Date.now(), name, cate, desc, img: imgPath
            });
            saveProducts(products);
            alert('产品保存成功！前台已更新');
            renderList();
        }

        function renderList() {
            const list = getProducts();
            let html = '<h3>已添加产品</h3>';
            list.forEach(p => {
                html += `
                <div class="pro-item">
                    <p><strong>${p.name}</strong> - ${p.cate}</p>
                    <p>${p.desc}</p>
                    <button onclick="delProduct(${p.id})">删除</button>
                </div>`;
            });
            document.getElementById('proList').innerHTML = html;
        }

        function delProduct(id) {
            const products = getProducts().filter(p => p.id !== id);
            saveProducts(products);
            renderList();
        }

        renderList();
    </script>
</body>
</html>
