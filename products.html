<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品中心 - 平阳县睿祥纺织有限公司</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <div class="nav-container">
            <a href="index.html">首页</a>
            <a href="about.html">关于我们</a>
            <a href="products.html">产品中心</a>
            <a href="news.html">新闻资讯</a>
            <a href="contact.html">联系我们</a>
        </div>
    </div>

    <div class="container">
        <h2>口罩绳产品系列</h2>
        <div class="pro-grid" id="proWrap">
            <p style="text-align:center; grid-column: 1 / -1; padding: 40px;">加载中...</p>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-info">
                <h4>平阳县睿祥纺织有限公司</h4>
                <p>专业生产销售各类口罩绳、耳带产品</p>
            </div>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我们</a>
                <a href="products.html">产品中心</a>
                <a href="news.html">新闻资讯</a>
                <a href="contact.html">联系我们</a>
            </div>
        </div>
        <p class="footer-copyright">©2026 平阳县睿祥纺织有限公司 版权所有</p>
    </div>

    <script src="data/products.js"></script>
    <script>
        const wrap = document.getElementById('proWrap');
        if (productsData.length === 0) {
            wrap.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; padding: 40px;">暂无产品</p>';
        } else {
            wrap.innerHTML = '';
            productsData.forEach(p => {
                wrap.innerHTML += `
                <div class="pro-card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="pro-info">
                        <h4>${p.name}</h4>
                        <p>${p.cate}</p>
                        <p>${p.desc}</p>
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
